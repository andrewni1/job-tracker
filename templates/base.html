<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
        /* Toast animation */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out; }
        .toast-exit { animation: fadeOut 0.3s ease-in forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="text-2xl font-bold tracking-tight flex items-center gap-2 hover:opacity-90 transition-opacity">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Job Tracker
                </a>
                <nav class="flex items-center gap-4 text-sm font-medium">
                    <a href="/" class="text-indigo-200 hover:text-white transition-colors">Dashboard</a>
                    <a href="/calendar" class="text-indigo-200 hover:text-white transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        Calendar
                    </a>
                    <a href="/analytics" class="text-indigo-200 hover:text-white transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                        Analytics
                    </a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 text-xs text-indigo-300">
                    <kbd class="px-1.5 py-0.5 rounded bg-indigo-500/30 border border-indigo-400/40 font-mono">/</kbd>
                    <span>Search</span>
                    <kbd class="px-1.5 py-0.5 rounded bg-indigo-500/30 border border-indigo-400/40 font-mono ml-2">N</kbd>
                    <span>New</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <footer class="text-center text-slate-400 text-xs py-6">
        Built with FastAPI + HTMX + Tailwind &bull;
        <kbd class="px-1 py-0.5 rounded bg-slate-100 border border-slate-200 font-mono text-slate-500">/</kbd> Search
        <kbd class="px-1 py-0.5 rounded bg-slate-100 border border-slate-200 font-mono text-slate-500 ml-1">N</kbd> New
        <kbd class="px-1 py-0.5 rounded bg-slate-100 border border-slate-200 font-mono text-slate-500 ml-1">?</kbd> Shortcuts
    </footer>

    <script>
    // ---- Keyboard shortcuts ----
    document.addEventListener('keydown', function(e) {
        // Ignore when typing in inputs/textareas/selects
        const tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

        if (e.key === '/') {
            e.preventDefault();
            const search = document.getElementById('search-input');
            if (search) { search.focus(); search.select(); }
        }
        else if (e.key === 'n' || e.key === 'N') {
            e.preventDefault();
            const urlInput = document.getElementById('linkedin_url');
            if (urlInput) { urlInput.focus(); window.scrollTo({top: 0, behavior: 'smooth'}); }
        }
        else if (e.key === '?') {
            e.preventDefault();
            showToast('⌨️ Shortcuts: / = Search, N = New app, Esc = Unfocus', 'info', 4000);
        }
    });

    // Escape to unfocus
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { document.activeElement.blur(); }
    });

    // ---- Toast notifications ----
    function showToast(message, type = 'success', duration = 3000) {
        const container = document.getElementById('toast-container');
        const colors = {
            success: 'bg-emerald-600 text-white',
            error:   'bg-rose-600 text-white',
            info:    'bg-indigo-600 text-white',
        };
        const icons = {
            success: '✅',
            error:   '❌',
            info:    'ℹ️',
        };
        const toast = document.createElement('div');
        toast.className = `${colors[type] || colors.info} px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2 toast-enter max-w-sm`;
        toast.innerHTML = `<span>${icons[type] || ''}</span><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // Show toast on HTMX events
    document.addEventListener('htmx:afterRequest', function(e) {
        const verb = (e.detail.requestConfig?.verb || '').toUpperCase();
        if (e.detail.successful) {
            if (verb === 'POST' && e.detail.pathInfo?.requestPath === '/applications') {
                showToast('Application saved!', 'success');
            } else if (verb === 'DELETE') {
                showToast('Application deleted', 'info');
            }
        } else if (e.detail.failed) {
            showToast('Something went wrong', 'error');
        }
    });
    </script>
</body>
</html>
