{% extends "base.html" %}
{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<h1 class="text-2xl font-bold text-slate-800 mb-2">Analytics</h1>
<p class="text-sm text-slate-500 mb-6">
    {{ data.total }} applications over {{ data.days_active }} days
    &bull; ~{{ data.apps_per_week }} apps/week
</p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

    <!-- Status Funnel (Doughnut) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Application Pipeline</h2>
        <div style="height: 280px;">
            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <!-- Weekly Trend (Bar) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Weekly Activity</h2>
        <div style="height: 280px;">
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>

    <!-- Top Companies (Horizontal Bar) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Top Companies</h2>
        <div style="height: 280px;">
            <canvas id="companyChart"></canvas>
        </div>
    </div>

    <!-- Monthly Trend (Line) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Monthly Trend</h2>
        <div style="height: 280px;">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <!-- Location Breakdown -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Locations</h2>
        <div style="height: 280px;">
            <canvas id="locationChart"></canvas>
        </div>
    </div>

    <!-- Seniority Breakdown -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-3">Seniority Levels</h2>
        <div style="height: 280px;">
            <canvas id="seniorityChart"></canvas>
        </div>
    </div>
</div>

<script>
const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { size: 11 } } } }
};

// Status Pipeline (Doughnut)
new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
        labels: ['Applied', 'Interviewing', 'Offer', 'Rejected', 'Withdrawn'],
        datasets: [{
            data: [
                {{ data.status_data.get('Applied', 0) }},
                {{ data.status_data.get('Interviewing', 0) }},
                {{ data.status_data.get('Offer', 0) }},
                {{ data.status_data.get('Rejected', 0) }},
                {{ data.status_data.get('Withdrawn', 0) }}
            ],
            backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#94a3b8'],
            borderWidth: 0,
            hoverOffset: 8,
        }]
    },
    options: {
        ...chartDefaults,
        cutout: '55%',
        plugins: {
            ...chartDefaults.plugins,
            legend: { position: 'bottom', labels: { padding: 16, font: { size: 11 } } }
        }
    }
});

// Weekly Activity (Bar)
new Chart(document.getElementById('weeklyChart'), {
    type: 'bar',
    data: {
        labels: [{% for w in data.weekly %}'{{ w.label }}'{{ ', ' if not loop.last }}{% endfor %}],
        datasets: [{
            label: 'Applications',
            data: [{% for w in data.weekly %}{{ w.count }}{{ ', ' if not loop.last }}{% endfor %}],
            backgroundColor: '#6366f1',
            borderRadius: 4,
            barPercentage: 0.7,
        }]
    },
    options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { display: false } },
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
            x: { ticks: { font: { size: 9 }, maxRotation: 45 } }
        }
    }
});

// Top Companies (Horizontal Bar)
new Chart(document.getElementById('companyChart'), {
    type: 'bar',
    data: {
        labels: [{% for c in data.top_companies %}'{{ c.name }}'{{ ', ' if not loop.last }}{% endfor %}],
        datasets: [{
            label: 'Apps',
            data: [{% for c in data.top_companies %}{{ c.count }}{{ ', ' if not loop.last }}{% endfor %}],
            backgroundColor: '#8b5cf6',
            borderRadius: 4,
        }]
    },
    options: {
        ...chartDefaults,
        indexAxis: 'y',
        plugins: { ...chartDefaults.plugins, legend: { display: false } },
        scales: {
            x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
            y: { ticks: { font: { size: 11 } } }
        }
    }
});

// Monthly Trend (Line)
new Chart(document.getElementById('monthlyChart'), {
    type: 'line',
    data: {
        labels: [{% for m in data.monthly %}'{{ m.label }}'{{ ', ' if not loop.last }}{% endfor %}],
        datasets: [{
            label: 'Applications',
            data: [{% for m in data.monthly %}{{ m.count }}{{ ', ' if not loop.last }}{% endfor %}],
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99, 102, 241, 0.1)',
            fill: true,
            tension: 0.3,
            pointBackgroundColor: '#6366f1',
            pointRadius: 4,
        }]
    },
    options: {
        ...chartDefaults,
        plugins: { ...chartDefaults.plugins, legend: { display: false } },
        scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } },
            x: { ticks: { font: { size: 10 } } }
        }
    }
});

// Location (Doughnut)
new Chart(document.getElementById('locationChart'), {
    type: 'doughnut',
    data: {
        labels: [{% for l in data.locations %}'{{ l.name }}'{{ ', ' if not loop.last }}{% endfor %}],
        datasets: [{
            data: [{% for l in data.locations %}{{ l.count }}{{ ', ' if not loop.last }}{% endfor %}],
            backgroundColor: ['#6366f1','#8b5cf6','#a78bfa','#c4b5fd','#3b82f6','#60a5fa','#93c5fd','#bfdbfe'],
            borderWidth: 0,
        }]
    },
    options: {
        ...chartDefaults,
        cutout: '50%',
        plugins: {
            ...chartDefaults.plugins,
            legend: { position: 'right', labels: { padding: 10, font: { size: 10 } } }
        }
    }
});

// Seniority (Polar Area)
new Chart(document.getElementById('seniorityChart'), {
    type: 'polarArea',
    data: {
        labels: [{% for s in data.seniority %}'{{ s.name }}'{{ ', ' if not loop.last }}{% endfor %}],
        datasets: [{
            data: [{% for s in data.seniority %}{{ s.count }}{{ ', ' if not loop.last }}{% endfor %}],
            backgroundColor: ['#6366f180','#8b5cf680','#f59e0b80','#10b98180','#ef444480','#94a3b880'],
            borderWidth: 1,
        }]
    },
    options: {
        ...chartDefaults,
        plugins: {
            ...chartDefaults.plugins,
            legend: { position: 'right', labels: { padding: 10, font: { size: 10 } } }
        }
    }
});
</script>
{% endblock %}
