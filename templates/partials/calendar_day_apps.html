<!-- Apps for a selected calendar day -->
{% if apps %}
<div class="mt-2">
    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wide mb-3 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-indigo-500"></span>
        {{ selected_date }}
        <span class="text-slate-400 font-normal">({{ apps|length }} app{{ 's' if apps|length > 1 else '' }})</span>
    </h3>
    <div class="space-y-3">
        {% for app in apps %}
        {% set target = "#calendar-apps" %}
        {% set source = "calendar" %}
        {% include "partials/app_card.html" %}
        {% endfor %}
    </div>
</div>
{% else %}
<div class="text-center py-10 text-slate-400">
    <p class="text-sm">No applications on <strong class="text-slate-500">{{ selected_date }}</strong></p>
</div>
{% endif %}
