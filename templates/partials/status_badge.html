<!-- Reusable status badge -->
{% if status == 'Applied' %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-700 border border-blue-200">
    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Applied
</span>
{% elif status == 'Interviewing' %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700 border border-amber-200">
    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Interviewing
</span>
{% elif status == 'Offer' %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700 border border-emerald-200">
    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Offer
</span>
{% elif status == 'Rejected' %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-rose-100 text-rose-600 border border-rose-200">
    <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span> Rejected
</span>
{% else %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 border border-slate-200">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span> Withdrawn
</span>
{% endif %}
