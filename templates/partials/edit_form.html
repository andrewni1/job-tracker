<!-- Inline edit form — replaces the app card -->
<div class="bg-indigo-50 rounded-lg border-2 border-indigo-300 p-4" id="app-{{ app.id }}">
    <form
        hx-put="/applications/{{ app.id }}"
        hx-target="#app-list"
        hx-swap="innerHTML"
        hx-on::after-request="htmx.ajax('GET', '/dashboard', '#dashboard')"
        class="space-y-3"
    >
        <div class="flex items-center justify-between mb-1">
            <h4 class="text-sm font-semibold text-indigo-700">Edit Application</h4>
            <button type="button"
                hx-get="/applications/list"
                hx-target="#app-list"
                hx-swap="innerHTML"
                class="text-xs text-slate-400 hover:text-slate-600 transition-colors"
            >Cancel</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-0.5">Job Title</label>
                <input type="text" name="job_title" value="{{ app.job_title }}"
                    class="w-full border border-slate-300 rounded-md px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-0.5">Company</label>
                <input type="text" name="company" value="{{ app.company }}"
                    class="w-full border border-slate-300 rounded-md px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-0.5">Location</label>
                <input type="text" name="location" value="{{ app.location }}"
                    class="w-full border border-slate-300 rounded-md px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-600 mb-0.5">Notes</label>
            <textarea name="notes" rows="2"
                class="w-full border border-slate-300 rounded-md px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ app.notes }}</textarea>
        </div>
        <div class="flex items-center gap-2">
            <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-1.5 rounded-md transition-colors">
                Save Changes
            </button>
        </div>
    </form>
</div>
